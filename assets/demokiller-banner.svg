      <stop offset="0" stop-color="#121212"/>
      <stop offset="0.62" stop-color="#171411"/>
      <stop offset="1" stop-color="#0B0B0B"/>
    </linearGradient>
    <radialGradient id="heat" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(958 86) rotate(138) scale(328 208)">
